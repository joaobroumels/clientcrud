spring.application.name=clientcrud

# Dados de conexÐo com o banco H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

# ConfiguraÓÐo do cliente web do banco H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ConfiguraÓÐo para mostrar o SQL no console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=truespring.profiles.active=test
spring.jpa.open-in-view=false
